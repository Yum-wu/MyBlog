# Deploy MyBlog to GitHub Pages
name: Deploy MyBlog to GitHub Pages

on:
  push:
    branches: [main, vercel-deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: client
        run: rm -rf node_modules && npm install

      - name: Fix permissions
        run: chmod -R +x client/node_modules/.bin/

      - name: Build
        working-directory: client
        run: npm run build

      - name: Copy 404.html for SPA routing
        run: cp client/dist/index.html client/dist/404.html

      - name: Create .nojekyll
        run: touch client/dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: client/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
